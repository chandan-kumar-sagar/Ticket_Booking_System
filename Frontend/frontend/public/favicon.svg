<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#c026d3"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>

  <!-- image mark -->
  <g filter="url(#shadow)">
    <rect x="10" y="14" width="22" height="22" rx="8" fill="rgba(255,255,255,0.85)"/>
    <image href="/brand-ticket.png" x="11.5" y="15.5" width="19" height="19" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- text -->
  <g filter="url(#shadow)">
    <text x="34" y="30" text-anchor="start" font-family="system-ui, Segoe UI, Arial" font-size="12" font-weight="800" fill="#fff">Ticket</text>
    <text x="34" y="44" text-anchor="start" font-family="system-ui, Segoe UI, Arial" font-size="12" font-weight="900" fill="#fff">Hub</text>
  </g>
</svg>